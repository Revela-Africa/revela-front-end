query AdminGetUserSingleVehicle($vehicleId: String!) {
  adminGetUserSingleVehicle(vehicleId: $vehicleId) {
    id
    status
    make
    model
    year
    mileage
    condition
    vin
    tav
    min
    max
    offer
    serviceHistory
    engineType
    transmission
    drivetrain
    structuralDamage
    mechanicalOverhaul
    userId
    agentName
    agentPhone
    scheduledAt
    collectionDate
    timeSlot
    bookingReference
    inspectorId
    assignedToInspector
    expiresAt
    region
    imageUrls {
      imageUrl
      angle
    }
  }
}